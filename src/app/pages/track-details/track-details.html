<table mat-table [dataSource]="dataSource" cdkDropList cdkDropListOrientation="horizontal"
  (cdkDropListDropped)="drop($event)">

  <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
    <th mat-header-cell cdkDrag *matHeaderCellDef> {{ col.label }} </th>
    <td mat-cell *matCellDef="let element"> {{ element[col.key] }} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns.map(c => c.key)"></tr>
  <tr mat-row *matRowDef="let row; columns: columns.map(c => c.key)"></tr>
</table>
